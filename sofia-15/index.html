<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XV Años de Sofía ✦ La Noche Estrellada</title>
    <meta name="description" content="Estás invitado a La Noche Estrellada de Sofía: sus XV años. 19 de diciembre de 2026, 6:00 PM · Finca 8, Vereda La Mata, Floridablanca." />
    <meta name="theme-color" content="#050b1f" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>✨</text></svg>" />

    <!-- Open Graph: previsualización al compartir por WhatsApp / redes -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="XV Años de Sofía ✦ La Noche Estrellada" />
    <meta property="og:description" content="Estás invitado a La Noche Estrellada de Sofía. 19 de diciembre de 2026, 6:00 PM · Finca 8, Vereda La Mata, Floridablanca. ¡Confirma tu asistencia!" />
    <meta property="og:image" content="https://florezz17.github.io/InvitacionSofiaXV/og.jpg" />
    <meta property="og:url" content="https://florezz17.github.io/InvitacionSofiaXV/" />
    <meta property="og:locale" content="es_CO" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- Loader estático: visible de inmediato mientras descarga el bundle JS.
         React lo desvanece y elimina al montar (ver App.jsx) -->
    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 3000;
        background: #050b1f;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        transition: opacity 0.6s ease;
      }
      #app-loader.done {
        opacity: 0;
        pointer-events: none;
      }
      #app-loader .loader-star {
        font-size: 3rem;
        animation: loaderPulse 1.6s ease-in-out infinite;
      }
      #app-loader p {
        color: rgba(245, 230, 66, 0.85);
        font-family: Georgia, 'Times New Roman', serif;
        font-style: italic;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        font-size: 0.7rem;
        text-align: center;
        padding: 0 2rem;
      }
      @keyframes loaderPulse {
        0%, 100% { transform: scale(1);    opacity: 0.65; }
        50%      { transform: scale(1.25); opacity: 1; }
      }
    </style>
    <div id="app-loader">
      <div class="loader-star">✨</div>
      <p>La Noche Estrellada de Sofía</p>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
