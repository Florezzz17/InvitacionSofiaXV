<!doctype html>
<!-- Herramienta LOCAL para generar los links personalizados de la invitación.
     No se publica en GitHub Pages (el deploy solo sube sofia-15/dist).
     Uso: doble click sobre este archivo → pegar la lista → Generar. -->
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generador de links — XV Sofía</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050b1f;
      color: #fff;
      font-family: Georgia, 'Times New Roman', serif;
      min-height: 100vh;
      padding: 3rem 1.5rem;
    }
    .wrap { max-width: 860px; margin: 0 auto; }
    h1 {
      color: #f5e642;
      font-size: 1.5rem;
      font-weight: normal;
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
    }
    p.hint {
      color: rgba(255,255,255,0.6);
      font-style: italic;
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    p.hint code {
      font-family: Consolas, monospace;
      font-style: normal;
      background: rgba(245,230,66,0.1);
      border: 1px solid rgba(245,230,66,0.25);
      border-radius: 4px;
      padding: 0.05rem 0.4rem;
      color: #f5e642;
      font-size: 0.8rem;
    }
    textarea {
      width: 100%;
      min-height: 160px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(245,230,66,0.3);
      border-radius: 12px;
      color: #fff;
      font-family: Consolas, monospace;
      font-size: 0.95rem;
      padding: 1rem;
      resize: vertical;
    }
    textarea:focus { outline: 2px solid rgba(245,230,66,0.5); }
    button {
      background: linear-gradient(135deg, rgba(245,230,66,0.25), rgba(245,230,66,0.1));
      border: 1px solid rgba(245,230,66,0.5);
      border-radius: 10px;
      color: #f5e642;
      font-family: inherit;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      padding: 0.7rem 1.6rem;
      cursor: pointer;
      margin: 1.25rem 0;
    }
    button:hover { background: rgba(245,230,66,0.3); }
    .fila {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(245,230,66,0.15);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      margin-bottom: 0.6rem;
      flex-wrap: wrap;
    }
    .fila .nombre { color: #f5e642; min-width: 180px; font-style: italic; }
    .fila .link {
      flex: 1;
      font-family: Consolas, monospace;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.75);
      word-break: break-all;
      min-width: 250px;
    }
    .fila .copiar {
      margin: 0;
      padding: 0.4rem 1rem;
      font-size: 0.8rem;
    }
    .ok { color: #7be67b !important; border-color: #7be67b !important; }
    #salidaTodo { margin-top: 1.5rem; display: none; }
    #salidaTodo textarea { min-height: 200px; font-size: 0.8rem; }
    h2 { color: rgba(245,230,66,0.8); font-size: 1rem; font-weight: normal; margin: 1.5rem 0 0.75rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>✨ Generador de links — XV de Sofía</h1>
    <p class="hint">
      Escribe un invitado por línea. Para reservar cupos, agrega una coma y el número.<br/>
      Ejemplos: &nbsp;<code>Familia Pérez</code> &nbsp;·&nbsp; <code>Familia Pérez, 4</code> &nbsp;·&nbsp; <code>Tía Marta y familia, 3</code>
    </p>

    <textarea id="entrada" placeholder="Familia Pérez, 4
Tía Marta y familia, 3
Carlos Rodríguez"></textarea>

    <button onclick="generar()">Generar links</button>

    <div id="resultado"></div>

    <div id="salidaTodo">
      <h2>Todos los links (para copiar de una vez)</h2>
      <textarea id="todoTexto" readonly></textarea>
      <button onclick="copiarTodo(this)">Copiar todo</button>
    </div>
  </div>

  <script>
    const BASE = 'https://florezzz17.github.io/InvitacionSofiaXV/'

    function generar() {
      const lineas = document.getElementById('entrada').value
        .split('\n').map(l => l.trim()).filter(Boolean)

      const resultado = document.getElementById('resultado')
      resultado.innerHTML = ''
      const todo = []

      for (const linea of lineas) {
        // Separar "Nombre, cupos" — la última coma seguida de un número
        const m = linea.match(/^(.*?)(?:\s*,\s*(\d{1,2}))?$/)
        const nombre = (m[1] || '').trim()
        const cupos = m[2] ? parseInt(m[2], 10) : null
        if (!nombre) continue

        let url = BASE + '?i=' + encodeURIComponent(nombre)
        if (cupos && cupos > 0 && cupos <= 20) url += '&c=' + cupos

        todo.push(nombre + (cupos ? ' (' + cupos + ' cupos)' : '') + '\n' + url + '\n')

        const fila = document.createElement('div')
        fila.className = 'fila'
        fila.innerHTML =
          '<span class="nombre">' + escapar(nombre) + (cupos ? ' · ' + cupos + ' cupos' : '') + '</span>' +
          '<span class="link">' + escapar(url) + '</span>'
        const btn = document.createElement('button')
        btn.className = 'copiar'
        btn.textContent = 'Copiar'
        btn.onclick = () => copiar(url, btn)
        fila.appendChild(btn)
        resultado.appendChild(fila)
      }

      const salida = document.getElementById('salidaTodo')
      if (todo.length) {
        document.getElementById('todoTexto').value = todo.join('\n')
        salida.style.display = 'block'
      } else {
        salida.style.display = 'none'
      }
    }

    function copiar(texto, btn) {
      navigator.clipboard.writeText(texto).then(() => {
        btn.textContent = '¡Copiado!'
        btn.classList.add('ok')
        setTimeout(() => { btn.textContent = 'Copiar'; btn.classList.remove('ok') }, 1500)
      })
    }

    function copiarTodo(btn) {
      copiar(document.getElementById('todoTexto').value, btn)
    }

    function escapar(s) {
      const d = document.createElement('div')
      d.textContent = s
      return d.innerHTML
    }
  </script>
</body>
</html>
